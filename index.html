<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mosca Crypto Exchange</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <!-- Main View -->
  <div id="home-screen" class="screen active">
    <header>
      <div class="balance-card">
        <p class="balance-label">Общий баланс</p>
        <p id="total-balance" class="balance-amount">$0.00</p>
      </div>
    </header>

    <div class="actions-grid">
      <button class="btn btn-primary" onclick="showScreen('exchange-screen')">
        <span>🔄</span> Обменять
      </button>
      <button class="btn btn-secondary" onclick="Telegram.WebApp.showAlert('Скоро!')">
        <span>📥</span> Пополнить
      </button>
    </div>

    <h2 class="section-title">Рынки</h2>
    <div class="asset-list" id="markets">
      <!-- Generated by JS -->
      <div class="asset-item">
        <div class="asset-info">
          <div class="asset-icon" style="color: #f3ba2f;">B</div>
          <div>
            <p class="asset-name">Bitcoin</p>
            <p class="asset-symbol">BTC</p>
          </div>
        </div>
        <div class="asset-price-group">
          <p class="asset-price">$65,432.10</p>
          <p class="asset-change">+2.4%</p>
        </div>
      </div>
      
      <div class="asset-item">
        <div class="asset-info">
          <div class="asset-icon" style="color: #627eea;">E</div>
          <div>
            <p class="asset-name">Ethereum</p>
            <p class="asset-symbol">ETH</p>
          </div>
        </div>
        <div class="asset-price-group">
          <p class="asset-price">$3,456.78</p>
          <p class="asset-change">+1.2%</p>
        </div>
      </div>

      <div class="asset-item">
        <div class="asset-info">
          <div class="asset-icon" style="color: #00ff88;">T</div>
          <div>
            <p class="asset-name">Tether</p>
            <p class="asset-symbol">USDT</p>
          </div>
        </div>
        <div class="asset-price-group">
          <p class="asset-price">$1.00</p>
          <p class="asset-change">0.0%</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Exchange Screen -->
  <div id="exchange-screen" class="screen">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
      <button onclick="showScreen('home-screen')" style="background: none; border: none; font-size: 24px; color: white; cursor: pointer;">←</button>
      <h2 style="font-size: 24px;">Обмен</h2>
    </div>

    <div class="input-group">
      <label class="input-label">Вы отдаете</label>
      <div style="position: relative;">
        <input type="number" class="crypto-input" placeholder="0.00" id="send-amount">
        <span style="position: absolute; right: 16px; top: 16px; color: var(--accent-color); font-weight: 600;">USDT</span>
      </div>
    </div>

    <div style="text-align: center; margin: -10px 0 10px; font-size: 24px;">⬇️</div>

    <div class="input-group">
      <label class="input-label">Вы получаете (примерно)</label>
      <div style="position: relative;">
        <input type="number" class="crypto-input" placeholder="0.00" id="receive-amount" readonly>
        <span style="position: absolute; right: 16px; top: 16px; color: #f3ba2f; font-weight: 600;">BTC</span>
      </div>
    </div>

    <div style="background: var(--glass); padding: 16px; border-radius: 16px; margin-bottom: 24px;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
        <span style="color: var(--text-secondary);">Курс</span>
        <span>1 BTC ≈ 65,000 USDT</span>
      </div>
      <div style="display: flex; justify-content: space-between;">
        <span style="color: var(--text-secondary);">Комиссия (0.5%)</span>
        <span>0.00 USDT</span>
      </div>
    </div>

    <button id="confirm-btn" class="btn btn-primary" style="width: 100%;">Подтвердить обмен</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="#" class="nav-item active" onclick="showScreen('home-screen')">
      <span class="nav-icon">🏠</span>
      <span>Главная</span>
    </a>
    <a href="#" class="nav-item" onclick="showScreen('exchange-screen')">
      <span class="nav-icon">🔄</span>
      <span>Обмен</span>
    </a>
    <a href="#" class="nav-item" onclick="Telegram.WebApp.showAlert('Раздел в разработке')">
      <span class="nav-icon">👤</span>
      <span>Профиль</span>
    </a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
